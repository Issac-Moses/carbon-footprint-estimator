<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Household Carbon Estimator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-success">
        <div class="container">
            <a class="navbar-brand" href="/">Eco Footprint</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="/">Home</a>
                <a class="nav-link" href="/dashboard">Dashboard</a>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow">
                    <div class="card-header bg-success text-white">
                        <h3 class="mb-0 text-center">Household Consumption Form</h3>
                    </div>
                    <div class="card-body p-4">
                        <form action="/household" method="POST">
                            <div class="mb-3">
                                <label for="petrol" class="form-label">Petrol (Litres)</label>
                                <input type="number" step="0.01" class="form-control" id="petrol" name="petrol" required>
                            </div>
                            <div class="mb-3">
                                <label for="diesel" class="form-label">Diesel (Litres)</label>
                                <input type="number" step="0.01" class="form-control" id="diesel" name="diesel" required>
                            </div>
                            <div class="mb-3">
                                <label for="gas" class="form-label">Gas / LPG (kg)</label>
                                <input type="number" step="0.01" class="form-control" id="gas" name="gas" required>
                            </div>
                            <div class="mb-3">
                                <label for="electricity" class="form-label">Electricity (kWh)</label>
                                <input type="number" step="0.01" class="form-control" id="electricity" name="electricity" required>
                            </div>
                            <div class="mb-4">
                                <label for="oil" class="form-label">Oil (Litres)</label>
                                <input type="number" step="0.01" class="form-control" id="oil" name="oil" required>
                            </div>
                            <div class="d-grid">
                                <button type="submit" class="btn btn-success btn-lg">Calculate Emission</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
