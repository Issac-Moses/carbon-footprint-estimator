<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emission Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-success">
        <div class="container">
            <a class="navbar-brand" href="/">Eco Footprint</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="/">Home</a>
                <a class="nav-link active" href="/dashboard">Dashboard</a>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <h2 class="text-success mb-4 text-center">Emissions Dashboard</h2>
        
        <div class="card shadow">
            <div class="card-body">
                {% if message %}
                    <div class="alert alert-info text-center">
                        {{ message }}
                    </div>
                {% else %}
                    <div class="text-center">
                        <img src="data:image/png;base64,{{ chart_url }}" alt="Emissions Chart" class="img-fluid rounded border">
                    </div>
                {% endif %}
            </div>
        </div>
        
        <div class="text-center mt-4">
            <a href="/" class="btn btn-outline-success">Back to Home</a>
        </div>
    </div>
</body>
</html>
